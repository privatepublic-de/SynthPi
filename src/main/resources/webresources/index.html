<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SynthPi // Control Interface</title>
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.js"></script>
  </head>
  <body class="connecting">
    <div id="status">
      <span class="connstate">connecting…</span>
    </div>
    <!--
      Phase 1 skeleton. One bound rotary so we can verify end-to-end that
      knob → websocket → engine → echo → knob works. Phase 2 fills in the
      rest of the control surface.
    -->
    <div class="row">
      <div class="col cat3 area">
        <div>OSCILLATORS</div>
        <div class="row">
          <div class="rotary" data-osc="/osc/1/wave" data-label="OSC1 Wave"></div>
        </div>
      </div>
    </div>
  </body>
</html>
