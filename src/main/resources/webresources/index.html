<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SynthPi // Control Interface</title>
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.js"></script>
  </head>
  <body class="connecting">
    <div id="status">
      <span class="connstate"></span>
      <span id="patch-name">INITIAL</span>
      <span class="status-spacer"></span>
      <button id="btn-load">Load</button>
      <button id="btn-save">Save</button>
      <button id="btn-init">Init</button>
      <button id="btn-random">Random</button>
      <button id="btn-learn">MIDI Learn</button>
      <button id="btn-settings">Settings</button>
    </div>

    <!-- Row 1: Oscillators | Filter 1 | Filter Routing | Filter 2 -->
    <div class="row">

      <!-- Oscillators -->
      <div class="col cat3 area">
        <div class="row group-bottom">
          <div>OSCILLATORS · <span id="osc-mode-label">VA</span></div>
          <div class="select" data-osc="/osc/mode" data-list="Waves,Additive,Karplus,BLEP"></div>
          <div class="toggle" data-osc="/osc/mono" data-label="Mono">Mono</div>
          <div class="toggle" data-osc="/osc/2/sync" data-label="Sync">Sync</div>
        </div>
        <div class="row">
          <div class="rotary" data-osc="/osc/1/wave" data-label="OSC1 Wave"></div>
          <div class="rotary" data-osc="/osc/1/waveset" data-label="Set 1"></div>
          <div class="rotary" data-osc="/osc/noiselevel" data-label="Noise"></div>
          <div class="rotary" data-osc="/osc/mix" data-label="1 Mix 2" data-mix></div>
          <div class="rotary" data-osc="/osc/gain" data-label="Gain"></div>
        </div>
        <div class="row group-top">
          <div class="rotary" data-osc="/osc/2/wave" data-label="OSC2 Wave"></div>
          <div class="rotary" data-osc="/osc/2/waveset" data-label="Set 2"></div>
          <div class="rotary" data-osc="/osc/2/tuning" data-label="Semitones" data-bipolar></div>
          <div class="rotary" data-osc="/osc/2/tuning/fine" data-label="Fine Tune" data-bipolar></div>
          <div class="rotary" data-osc="/osc/2/am" data-label="Ringmod"></div>
        </div>
        <div class="row">
          <div class="rotary" data-osc="/osc/gliderate" data-label="Glide"></div>
        </div>
        <!-- BLEP-only subpanel: only visible when osc mode = BLEP -->
        <div class="row group-top blep-only">
          <div class="rotary" data-osc="/osc/1/pw" data-label="OSC1 Width"></div>
          <div class="rotary" data-osc="/osc/2/pw" data-label="OSC2 Width"></div>
          <div class="rotary" data-osc="/osc/sub/volume" data-label="Sub Vol"></div>
          <div class="col">
            <div class="toggle" data-osc="/osc/sub/low" data-label="Sub -2 oct">−2 Oct</div>
            <div class="toggle" data-osc="/osc/sub/square" data-label="Sub Sq">Square</div>
            <div class="toggle" data-osc="/osc/2/keytrack" data-label="OSC2 Keytrack">OSC2 Track</div>
          </div>
        </div>
      </div>

      <!-- Filter 1 -->
      <div class="col cat1 area">
        <div class="row fstart">
          <div>FILTER 1</div>
          <div class="toggle" data-osc="/filter/1/enable" data-label="On">On</div>
        </div>
        <div class="select group-bottom" data-osc="/filter/1/type" data-list="LP24,LP12,BP,HP,Notch,Allp"></div>
        <div class="row group-bottom">
          <div class="rotary" data-osc="/filter/1/freq" data-label="Cutoff"></div>
          <div class="rotary" data-osc="/filter/1/res" data-label="Resonance"></div>
          <div class="rotary" data-osc="/filter/1/overload" data-label="Drive"></div>
        </div>
        <div class="row">
          <div class="col envarea fcenter">
            <div class="row">
              <div class="fader" data-osc="/filter/1/env/1" data-label="A"></div>
              <div class="fader" data-osc="/filter/1/env/2" data-label="D"></div>
              <div class="fader" data-osc="/filter/1/env/3" data-label="S"></div>
              <div class="fader" data-osc="/filter/1/env/4" data-label="R"></div>
            </div>
            <div class="row">
              <div class="toggle" data-osc="/filter/1/env/loop" data-label="Loop">Loop</div>
              <div class="toggle" data-osc="/filter/1/velocity" data-label="Velocity">Velocity</div>
            </div>
          </div>
          <div class="col">
            <div class="rotary" data-osc="/filter/1/env/amount" data-label="Env Amount" data-bipolar></div>
            <div class="rotary" data-osc="/filter/1/kbdtracking" data-label="Keytrack"></div>
          </div>
        </div>
      </div>

      <!-- Filter Routing -->
      <div class="col cat1 area">
        <div>Filter Routing</div>
        <div class="select vertical" data-osc="/filter/parallel" data-list="Serial,Parallel,Per OSC"></div>
        <div class="rotary" data-osc="/filter/parallelmix" data-label="1 Mix 2" data-mix></div>
      </div>

      <!-- Filter 2 -->
      <div class="col cat1 area">
        <div class="row fstart">
          <div>FILTER 2</div>
          <div class="toggle" data-osc="/filter/2/enable" data-label="On">On</div>
        </div>
        <div class="select group-bottom" data-osc="/filter/2/type" data-list="LP24,LP12,BP,HP,Notch,Allp"></div>
        <div class="row group-bottom">
          <div class="rotary" data-osc="/filter/2/freq" data-label="Cutoff"></div>
          <div class="rotary" data-osc="/filter/2/res" data-label="Resonance"></div>
          <div class="rotary" data-osc="/filter/2/overload" data-label="Drive"></div>
        </div>
        <div class="row">
          <div class="col envarea fcenter">
            <div class="row">
              <div class="fader" data-osc="/filter/2/env/1" data-label="A"></div>
              <div class="fader" data-osc="/filter/2/env/2" data-label="D"></div>
              <div class="fader" data-osc="/filter/2/env/3" data-label="S"></div>
              <div class="fader" data-osc="/filter/2/env/4" data-label="R"></div>
            </div>
            <div class="row">
              <div class="toggle" data-osc="/filter/2/env/loop" data-label="Loop">Loop</div>
              <div class="toggle" data-osc="/filter/2/velocity" data-label="Velocity">Velocity</div>
            </div>
          </div>
          <div class="col">
            <div class="rotary" data-osc="/filter/2/env/amount" data-label="Env Amount" data-bipolar></div>
            <div class="rotary" data-osc="/filter/2/kbdtracking" data-label="Keytrack"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Row 2: Mod Env 1 | Mod Env 2 | LFO | Amp/FX -->
    <div class="row">

      <!-- Mod Envelope 1 -->
      <div class="col cat2 area">
        <div>MOD ENVELOPE 1</div>
        <div class="row">
          <div class="col envarea fcenter group-right">
            <div class="row">
              <div class="fader" data-osc="/mod/env/1" data-label="A"></div>
              <div class="fader" data-osc="/mod/env/2" data-label="D"></div>
              <div class="fader" data-osc="/mod/env/3" data-label="S"></div>
              <div class="fader" data-osc="/mod/env/4" data-label="R"></div>
            </div>
            <div class="row">
              <div class="toggle" data-osc="/mod/env/loop" data-label="Loop">Loop</div>
            </div>
          </div>
          <div class="col">
            <div class="row">
              <div class="rotary" data-osc="/mod/env/depth/pitch" data-label="Pitch" data-bipolar></div>
              <div class="rotary" data-osc="/mod/env/depth/pitch/2" data-label="Pitch 2" data-bipolar></div>
            </div>
            <div class="row">
              <div class="rotary" data-osc="/mod/env/depth/wave" data-label="Wave" data-bipolar></div>
              <div class="rotary" data-osc="/mod/env/depth/noise" data-label="Noise" data-bipolar></div>
            </div>
            <div class="row">
              <div class="rotary" data-osc="/mod/env/depth/am" data-label="Ringmod" data-bipolar></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Mod Envelope 2 (new — ADSR only, depth knobs land in phase 5 matrix) -->
      <div class="col cat2 area">
        <div>MOD ENVELOPE 2</div>
        <div class="col envarea fcenter">
          <div class="row">
            <div class="fader" data-osc="/mod/env/2/1" data-label="A"></div>
            <div class="fader" data-osc="/mod/env/2/2" data-label="D"></div>
            <div class="fader" data-osc="/mod/env/2/3" data-label="S"></div>
            <div class="fader" data-osc="/mod/env/2/4" data-label="R"></div>
          </div>
          <div class="row">
            <div class="toggle" data-osc="/mod/env/2/loop" data-label="Loop">Loop</div>
          </div>
        </div>
      </div>

      <!-- LFO -->
      <div class="col cat2 area">
        <div class="row">
          <div>LFO</div>
          <div class="select" data-osc="/mod/1/type" data-list="Sine,Triangle,Up,Down,Square,S&amp;H"></div>
        </div>
        <div class="row">
          <div class="col group-right">
            <div class="rotary" data-osc="/mod/1/rate" data-label="LFO Rate"></div>
            <div class="rotary" data-osc="/mod/1/amount" data-label="Amount"></div>
            <div class="toggle" data-osc="/mod/1/reset" data-label="Key Trigger">Key Trigger</div>
          </div>
          <div class="col">
            <div class="row">
              <div class="rotary" data-osc="/mod/1/depth/pitch" data-label="Pitch" data-bipolar></div>
              <div class="rotary" data-osc="/mod/1/depth/pitch/2" data-label="Pitch 2" data-bipolar></div>
              <div class="rotary" data-osc="/mod/1/depth/vol" data-label="Vol" data-bipolar></div>
            </div>
            <div class="row">
              <div class="rotary" data-osc="/mod/1/depth/wave/1" data-label="Wave 1" data-bipolar></div>
              <div class="rotary" data-osc="/mod/1/depth/wave/2" data-label="Wave 2" data-bipolar></div>
            </div>
            <div class="row">
              <div class="rotary" data-osc="/mod/1/depth/filter/1" data-label="Filter 1" data-bipolar></div>
              <div class="rotary" data-osc="/mod/1/depth/filter/2" data-label="Filter 2" data-bipolar></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Amp / FX -->
      <div class="col cat4 area">
        <div>AMP</div>
        <div class="row">
          <div class="col envarea fcenter group-right">
            <div class="row">
              <div class="fader" data-osc="/amp/env/1" data-label="A"></div>
              <div class="fader" data-osc="/amp/env/2" data-label="D"></div>
              <div class="fader" data-osc="/amp/env/3" data-label="S"></div>
              <div class="fader" data-osc="/amp/env/4" data-label="R"></div>
            </div>
            <div class="row">
              <div class="toggle" data-osc="/amp/env/loop" data-label="Loop">Loop</div>
              <div class="toggle" data-osc="/amp/velocity" data-label="Velocity">Velocity</div>
            </div>
          </div>
          <div class="col">
            <div class="row">
              <div class="rotary" data-osc="/fx/overdrive" data-label="Drive"></div>
              <div class="rotary" data-osc="/fx/chorus/drywet" data-label="Chorus"></div>
              <div class="rotary" data-osc="/fx/spread" data-label="Spread"></div>
            </div>
            <!-- Delay block: TYPE toggle + conditional right-rate knob -->
            <div class="row group-top group-bottom">
              <div class="rotary" data-osc="/fx/delay/wet" data-label="Delay"></div>
              <div class="rotary" data-osc="/fx/delay/rate" data-label="Time"></div>
              <div class="rotary delay-digital-only" data-osc="/fx/delay/rateright" data-label="Time R"></div>
              <div class="rotary" data-osc="/fx/delay/feedback" data-label="Feedback"></div>
              <div class="col">
                <div class="select vertical" data-osc="/fx/delay/type" data-list="Tape,Digital"></div>
              </div>
            </div>
            <div class="row">
              <div class="rotary" data-osc="/fx/reverb/oneknob" data-label="Reverb"></div>
              <div class="rotary" data-osc="/amp/volume" data-label="Volume"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal overlay + dialogs (patches.js opens / closes them). -->
    <div id="dimmer"></div>
    <div id="patchlistwindow" class="modal">
      <div class="modal-header">
        <span>Load Patch</span>
        <button class="modal-close" type="button">×</button>
      </div>
      <div class="listcontent"></div>
    </div>
    <div id="savepatchwindow" class="modal">
      <div class="modal-header">
        <span>Save Patch</span>
        <button class="modal-close" type="button">×</button>
      </div>
      <div class="save-form">
        <label>Name <input type="text" id="savename" /></label>
        <label>Category <select id="savecategory"></select></label>
        <button id="savebutton" type="button">Save as new</button>
      </div>
      <div class="modal-section">
        <div class="headline">Or overwrite an existing patch</div>
        <div class="existing-patches"></div>
      </div>
    </div>
    <div id="settingswindow" class="modal">
      <div class="modal-header">
        <span>Settings</span>
        <button class="modal-close" type="button">×</button>
      </div>
      <div class="settings-content"></div>
    </div>
  </body>
</html>
